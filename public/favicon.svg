<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16161f"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- Stylized X formed by two motion strokes -->
  <g stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Top-left to bottom-right -->
    <line x1="20" y1="20" x2="44" y2="44" stroke="#5e6ad2" stroke-width="6"/>
    <!-- Top-right to bottom-left -->
    <line x1="44" y1="20" x2="20" y2="44" stroke="#8b95e0" stroke-width="6"/>
  </g>
  
  <!-- White highlight on top portion of strokes for depth -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="20" x2="32" y2="32" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <line x1="44" y1="20" x2="32" y2="32" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  </g>
</svg>
