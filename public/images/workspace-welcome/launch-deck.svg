<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Launch Deck presentation cover</title>
  <desc id="description">Gray editorial launch cover matching the first slide of the presentation.</desc>
  <rect width="1600" height="900" fill="#989997"/>
  <text x="64" y="82" fill="#fff9f2" font-family="Arial, sans-serif" font-size="30" font-weight="700">MORROW</text>
  <text x="1490" y="82" fill="#15120f" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end">LAUNCH DECK</text>
  <text x="64" y="326" fill="#fff9f2" font-family="Arial, sans-serif" font-size="118" font-weight="700" letter-spacing="-5">Make every</text>
  <text x="64" y="438" fill="#fff9f2" font-family="Arial, sans-serif" font-size="118" font-weight="700" letter-spacing="-5">launch feel</text>
  <text x="64" y="550" fill="#fff9f2" font-family="Arial, sans-serif" font-size="118" font-weight="700" letter-spacing="-5">inevitable.</text>
  <text x="68" y="682" fill="#d8ccc0" font-family="Arial, sans-serif" font-size="30">A complete story for introducing a product, aligning</text>
  <text x="68" y="724" fill="#d8ccc0" font-family="Arial, sans-serif" font-size="30">the team, and taking it to market.</text>
  <text x="68" y="830" fill="#ff6f4e" font-family="Arial, sans-serif" font-size="24" font-weight="700">PRODUCT LAUNCH / 2026</text>
</svg>
